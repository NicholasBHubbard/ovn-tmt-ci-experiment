name: tmt CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  compile-macos:
    name: compile-macos
    runs-on: macos-latest
    timeout-minutes: 60
    steps:
      - name: Check out OVN
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Install build dependencies
        run: brew install automake libtool

      - name: Build OVS
        run: |
          cd ovs
          ./boot.sh
          ./configure --disable-ssl
          make -j$(sysctl -n hw.ncpu)

      - name: Build OVN
        run: |
          ./boot.sh
          ./configure --disable-ssl
          make -j$(sysctl -n hw.ncpu)

  unsharded:
    name: ${{ matrix.plan }}
    strategy:
      fail-fast: false
      matrix:
        plan:
          - compile-gcc
          - compile-clang
          - distcheck-gcc
    uses: ./.github/workflows/tmt-run.yml
    with:
      plan: ${{ matrix.plan }}

  unit-shards:
    name: ${{ matrix.plan }} ${{ matrix.testsuiteflags }}
    strategy:
      fail-fast: false
      matrix:
        plan:
          - unit-gcc
          - unit-clang
          - unit-clang-asan
          - unit-gcc-jemalloc
        testsuiteflags: ["-300", "301-600", "601-"]
    uses: ./.github/workflows/tmt-run.yml
    with:
      plan: ${{ matrix.plan }}
      testsuiteflags: ${{ matrix.testsuiteflags }}

  system-shards:
    name: ${{ matrix.plan }} ${{ matrix.testsuiteflags }}
    strategy:
      fail-fast: false
      matrix:
        plan:
          - system-gcc
          - system-clang-asan
          - system-userspace-gcc
          - system-dpdk-gcc
        testsuiteflags: ["-100", "101-200", "201-"]
    uses: ./.github/workflows/tmt-run.yml
    with:
      plan: ${{ matrix.plan }}
      testsuiteflags: ${{ matrix.testsuiteflags }}

  multihost-build:
    name: multihost basic and artifact build
    uses: ./.github/workflows/tmt-multihost-run.yml
    with:
      plan: basic
      build-artifact: true

  multihost:
    name: multihost ${{ matrix.plan }}
    needs: multihost-build
    strategy:
      fail-fast: false
      matrix:
        plan:
          - gateway-nat
    uses: ./.github/workflows/tmt-multihost-run.yml
    with:
      plan: ${{ matrix.plan }}
